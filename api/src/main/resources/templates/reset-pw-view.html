<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 초기화 인증 메일</title>
</head>
<body style="font-family: 'Segoe UI', sans-serif; background-color: #f9f9f9; padding: 20px;">
<div style="max-width: 600px; margin: auto; background-color: white; border-radius: 8px; box-shadow: 0 0 8px rgba(0, 0, 0, 0.05); padding: 30px;">
    <h2 style="color: #333333;">🔐 비밀번호 초기화 인증번호 안내</h2>
    <p style="font-size: 16px; color: #555555;">
        안녕하세요, 요청하신 비밀번호 초기화를 위한 인증번호를 아래에 안내드립니다.
    </p>

    <div style="margin: 30px 0; padding: 20px; background-color: #f2f4f6; border-left: 4px solid #4a90e2;">
        <p style="font-size: 18px; color: #333333; margin: 0;">✅ <strong>인증번호:</strong></p>
        <p style="font-size: 28px; color: #4a90e2; font-weight: bold; margin: 10px 0;">[[${verificationCode}]]</p>
    </div>

    <p style="font-size: 16px; color: #555555;">
        위 인증번호의 <strong>유효 시간은 발송 시점으로부터 5분</strong>입니다.<br/>
        인증 시간이 만료되면 다시 요청해 주세요.
    </p>

    <hr style="margin: 40px 0; border: none; border-top: 1px solid #dddddd;" />

    <p style="font-size: 13px; color: #999999;">
        본 메일은 발신 전용이며, 문의가 필요하신 경우 고객센터를 이용해 주세요.
    </p>
</div>
</body>
</html>
