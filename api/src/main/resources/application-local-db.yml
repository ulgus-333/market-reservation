spring:
  config:
    activate:
      on-profile: local-db
  datasource:
    hikari:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://localhost:3306
      username: root
      password: 1234
      minimum-idle: 1
      maximum-pool-size: 10
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 3000
      timeout: 3000
